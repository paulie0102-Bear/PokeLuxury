<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寶可夢記帳：豪華版</title>

<link rel="manifest" href='data:application/manifest+json,{
  "name": "寶可夢記帳：豪華版",
  "short_name": "PokeLuxury",
  "start_url": ".",
  "display": "standalone",
  "background_color": "#e0eed0",
  "theme_color": "#2d5a27",
  "icons": [
    {
      "src": "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/luxury-ball.png",
      "sizes": "128x128",
      "type": "image/png"
    }
  ]
}'>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
    :root { --primary: #2d5a27; --secondary: #3b5ba7; --hp-green: #4caf50; --hp-red: #f44336; --bond: #ff6b6b; }
    body { font-family: 'Courier New', sans-serif; background: #e0eed0; padding: 10px; margin: 0; font-size: 14px; padding-bottom: 60px; }
    .card { background: #f8fff0; border: 2px solid var(--primary); padding: 12px; margin-bottom: 10px; border-radius: 8px; box-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
    .stats-bar { display: flex; justify-content: space-around; background: var(--primary); color: white; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button { padding: 10px; border-radius: 6px; border: 1px solid var(--primary); cursor: pointer; font-weight: bold; font-family: inherit; }
    .btn-main { background: var(--primary); color: white; }
    .btn-atk { background: #ff9800; color: white; }
    .btn-blue { background: var(--secondary); color: white; }
    .hidden { display: none; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    #installBanner { display: none; background: #333; color: gold; padding: 10px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999; text-align: center; font-size: 12px; border-top: 2px solid gold; }
</style>
</head>
<body>

<div id="installBanner">
    ✨ 發現豪華球！將此 App 安裝到桌面？ 
    <button onclick="installApp()" style="background:gold; color:black; border:none; margin-left:10px; padding:4px 10px; border-radius:4px; font-weight:bold;">安裝</button>
</div>

<div class="stats-bar">
    <span>💰 $<span id="balance">0</span></span>
    <span>🍬 <span id="candy">0</span></span>
    <span>Lv.<span id="level">1</span></span>
</div>

<div class="card" id="buddyArea" style="display:flex; align-items:center; padding:8px;">
    <img id="buddyImg" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/luxury-ball.png" style="width:35px; margin-right:8px;">
    <div style="font-size:11px;">夥伴：<span id="buddyName">未設定</span><br>親密度: <span id="friendVal">0</span></div>
</div>

<div class="card" style="text-align:center;">
    <div id="turnBadge" class="hidden" style="font-size:10px; background:#333; color:white; padding:2px 8px; border-radius:10px; margin-bottom:5px;">剩餘行動：<span id="remTurn">5</span></div>
    <div id="msg" style="font-size:12px; height:30px;">🌿 使用豪華球記錄生活，與夥伴建立羈絆...</div>
    <img id="pokeImg" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/luxury-ball.png" style="width:110px; height:110px; object-fit:contain;">
    <div style="width:100%; height:8px; background:#ccc; border-radius:4px; overflow:hidden;">
        <div id="wildHp" style="height:100%; width:100%; background:var(--hp-green); transition:0.4s;"></div>
    </div>
    
    <div id="actionArea" class="hidden">
        <button class="btn-atk" style="width:100%; margin:10px 0;" onclick="attack()">⚔️ 攻擊 (降低 HP 以增加捕捉率)</button>
        <div class="grid">
            <button onclick="useBall('poke')">⚪ 球(x<span id="ball-poke">0</span>)</button>
            <button onclick="useBall('ultra')">🟡 球(x<span id="ball-ultra">0</span>)</button>
            <button onclick="useBall('luxury')" style="color:#d4af37;">💎 豪華球</button>
            <button onclick="runAway()">🏃 逃跑</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="grid" style="grid-template-columns: 1fr 2fr; margin-bottom: 8px;">
        <select id="cat">
            <option value="飲食">🍔 飲食</option>
            <option value="交通">🚗 交通</option>
            <option value="娛樂">🎮 娛樂</option>
            <option value="生活">🏠 生活</option>
            <option value="其他">❓ 其他</option>
        </select>
        <input id="note" type="text" placeholder="品名">
    </div>
    <div class="grid" style="grid-template-columns: 2fr 1fr;">
        <input id="amt" type="number" placeholder="金額">
        <button class="btn-main" onclick="record()">確認記帳</button>
    </div>
    <div class="grid" style="margin-top:8px;">
        <button onclick="openReport()">📊 統計帳單</button>
        <button onclick="openAdmin()">⚙️ 管理中心</button>
    </div>
</div>

<div id="reportModal" class="modal">
    <h3>📊 月度分類分析 <button onclick="closeModals()" style="float:right">❌</button></h3>
    <input type="month" id="filterMonth" onchange="renderReport()">
    <div id="catSummary" class="grid" style="margin:10px 0;"></div>
    <table><thead><tr><th>日期</th><th>項目</th><th>金額</th></tr></thead><tbody id="recordBody"></tbody></table>
</div>

<div id="adminModal" class="modal">
    <h3>⚙️ 管理中心 <button onclick="closeModals()" style="float:right">❌</button></h3>
    <div class="grid">
        <button class="btn-main" onclick="exportFullSave()">📤 備份資料</button>
        <button onclick="document.getElementById('importFile').click()">📥 還原資料</button>
        <button class="btn-blue" onclick="document.getElementById('csvFile').click()">📊 匯入CSV</button>
        <button onclick="archiveOldLogs()">📁 年度歸檔</button>
    </div>
    <input type="file" id="importFile" class="hidden" onchange="importFullSave(event)">
    <input type="file" id="csvFile" class="hidden" onchange="importCSV(event)">
</div>

<script>
// --- [ PWA Service Worker ] ---
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        const swBlob = new Blob([`const C='v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`], {type:'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(swBlob));
    });
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBanner').style.display = 'block'; });
async function installApp() { if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt = null; document.getElementById('installBanner').style.display='none'; } }

// --- [ 遊戲與記帳邏輯 ] ---
let state = { level: 1, balance: 0, candy: 0, pool: 0, items: { poke: 5, ultra: 2, luxury: 1 }, owned: [], logs: [], buddy: null, friendship: 0 };

function record() {
    const amt = parseInt(document.getElementById('amt').value);
    const note = document.getElementById('note').value || "未命名";
    const cat = document.getElementById('cat').value;
    if (isNaN(amt) || amt <= 0) return;

    state.balance += amt; state.pool += amt; state.candy += Math.floor(amt / 20);
    state.logs.push({ date: new Date().toISOString().split('T')[0], cat, note, amt });
    if(state.buddy) state.friendship = Math.min(300, state.friendship + 1);

    if (state.pool >= 100) { state.pool %= 100; spawn(); }
    else { document.getElementById('msg').innerText = `已記錄！進度：${Math.floor(state.pool)}%`; }
    updateUI(); document.getElementById('amt').value = ''; document.getElementById('note').value = '';
}

function spawn() {
    const id = Math.floor(Math.random() * 493) + 1;
    state.current = { id, hp: 100, catchRate: (id > 350 ? 5 : 45), turns: 0, maxT: (state.friendship >= 250 ? 7 : 5) };
    document.getElementById('pokeImg').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    document.getElementById('msg').innerText = `野生的 No.${id} 被香味吸引來了！`;
    document.getElementById('actionArea').classList.remove('hidden');
    document.getElementById('turnBadge').classList.remove('hidden');
    updateUI();
}

function attack() {
    if(!state.current) return;
    state.current.turns++;
    if(state.current.turns > state.current.maxT) { alert("逃跑了！"); runAway(); return; }
    state.current.hp = Math.max(state.friendship >= 150 ? 1 : 5, state.current.hp - 20);
    updateUI();
}

function useBall(type) {
    if(state.items[type] <= 0) return alert("球不夠了");
    state.items[type]--;
    state.current.turns++;
    
    // 豪華球捕捉率與超級球相同，但捕捉後親密度加成更高
    let bMult = {poke:1, ultra:2, luxury:1.5}[type];
    let chance = ((state.current.catchRate * bMult * (state.current.hp<20?3:1) * (state.friendship>200?1.8:1.2)) / 255);
    
    if(Math.random() < chance) {
        state.owned.push(state.current.id); state.level++; 
        state.friendship += (type === 'luxury' ? 15 : 5); // 豪華球捕捉加成
        alert("🎉 捕捉成功！" + (type==='luxury'?" 豪華球讓夥伴更親近了！":""));
        runAway();
    } else if(state.current.turns >= state.current.maxT) { alert("逃跑了！"); runAway(); }
    updateUI();
}

function runAway() { 
    state.current = null; document.getElementById('actionArea').classList.add('hidden'); 
    document.getElementById('turnBadge').classList.add('hidden');
    document.getElementById('pokeImg').src = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/luxury-ball.png";
    updateUI(); 
}

function openReport() { 
    document.getElementById('filterMonth').value = new Date().toISOString().substring(0, 7); 
    renderReport(); document.getElementById('reportModal').style.display = 'block'; 
}

function renderReport() {
    const filter = document.getElementById('filterMonth').value;
    const logs = state.logs.filter(l => l.date.startsWith(filter));
    const tbody = document.getElementById('recordBody');
    let cats = { "飲食":0, "交通":0, "娛樂":0, "生活":0, "其他":0 };
    tbody.innerHTML = '';
    logs.forEach(l => {
        cats[l.cat] += l.amt;
        tbody.innerHTML += `<tr><td>${l.date.substring(8)}日</td><td>[${l.cat}] ${l.note}</td><td>$${l.amt}</td></tr>`;
    });
    const summary = document.getElementById('catSummary');
    summary.innerHTML = '';
    for(let c in cats) if(cats[c]>0) summary.innerHTML += `<div style="font-size:10px; background:#eee; padding:5px; border-radius:4px;">${c}: $${cats[c]}</div>`;
}

function importCSV(e) {
    const reader = new FileReader();
    reader.onload = function(event) {
        const lines = event.target.result.split('\n').slice(1);
        lines.forEach(line => {
            const cols = line.split(',');
            if(cols.length < 2) return;
            const amt = parseInt(cols[cols.length-1]);
            if(!isNaN(amt)) { state.balance += amt; state.logs.push({ date: cols[0].replace(/"/g,''), cat: "其他", note: "載具匯入", amt }); }
        });
        updateUI(); alert("匯入成功！");
    };
    reader.readAsText(e.target.files[0]);
}

function exportFullSave() {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(state)], {type: "application/json"}));
    a.download = `PokeLuxury_Save_${new Date().toISOString().split('T')[0]}.json`; a.click();
}

function importFullSave(e) {
    const r = new FileReader();
    r.onload = function(event) { state = JSON.parse(event.target.result); updateUI(); location.reload(); };
    r.readAsText(e.target.files[0]);
}

function archiveOldLogs() {
    const y = prompt("歸檔年份?", "2024"); if(!y) return;
    const toA = state.logs.filter(l => l.date.startsWith(y));
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(toA)], {type: "application/json"}));
    a.download = `Archive_${y}.json`; a.click();
    state.logs = state.logs.filter(l => !l.date.startsWith(y)); updateUI(); alert("歸檔完成！");
}

function openAdmin() { document.getElementById('adminModal').style.display = 'block'; }
function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

function updateUI() {
    document.getElementById('balance').innerText = state.balance.toLocaleString();
    document.getElementById('candy').innerText = state.candy;
    document.getElementById('level').innerText = state.level;
    document.getElementById('ball-poke').innerText = state.items.poke;
    document.getElementById('ball-ultra').innerText = state.items.ultra;
    document.getElementById('friendVal').innerText = state.friendship;
    if(state.current) {
        document.getElementById('wildHp').style.width = state.current.hp + "%";
        document.getElementById('remTurn').innerText = state.current.maxT - state.current.turns;
        document.getElementById('wildHp').style.background = state.current.hp < 20 ? "var(--hp-red)" : "var(--hp-green)";
    }
    localStorage.setItem('pokeWallet_Luxury_v14', JSON.stringify(state));
}

const saved = localStorage.getItem('pokeWallet_Luxury_v14');
if(saved) state = JSON.parse(saved);
updateUI();
</script>
</body>
</html>
