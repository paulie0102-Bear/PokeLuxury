<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>墨香時光日記</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            /* 宣紙與墨色調 */
            --paper: #f4f0e6;
            --ink: #2c2e31;
            --seal-red: #a61e1e; /* 印章紅 */
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--paper);
            font-family: "STKaiti", "KaiTi", serif;
            overflow-x: hidden;
        }

        /* 水墨長卷：統一背景與紋理 */
        .scroll-canvas {
            position: relative;
            width: 100%;
            height: 300vh; /* 三倍身高 */
            /* 模擬宣紙纖維紋理 */
            background-image: 
                url('https://www.transparenttextures.com/patterns/handmade-paper.png'),
                linear-gradient(180deg, var(--paper) 0%, #e8e2d5 50%, #dcd5c5 100%);
            background-attachment: local;
        }

        /* ㄑ字型定位 (Z-Path) */
        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            width: 140px;
        }

        /* 右上：過去 */
        .node-past { top: 15vh; right: 12%; }
        /* 左中：現在 */
        .node-present { top: 115vh; left: 12%; }
        /* 右下：未來 */
        .node-future { top: 215vh; right: 12%; }

        /* 渲染圖標容器 */
        .icon-render {
            width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid var(--ink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: var(--ink);
            margin-bottom: 12px;
            box-shadow: 5px 5px 0px var(--ink); /* 硬陰影增加可愛渲染感 */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* 點擊時的縮放與小動畫 */
        .node:active .icon-render {
            transform: scale(0.9) translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--ink);
        }

        /* 標籤：紅印章風格 */
        .node-label {
            background-color: var(--seal-red);
            color: white;
            padding: 4px 12px;
            border-radius: 2px;
            font-size: 16px;
            letter-spacing: 3px;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        /* --- 彈窗樣式 --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.4s ease-out;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        .modal.active { transform: translateY(0); }

        .modal-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .back-btn {
            font-size: 18px; color: var(--ink);
            background: none; border: 1.5px solid var(--ink);
            padding: 5px 15px; border-radius: 20px;
        }

        /* --- 底部備份欄 (避開 iOS 手勢) --- */
        .footer-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(244, 240, 230, 0.8);
            backdrop-filter: blur(8px);
            padding: 10px 20px calc(15px + var(--safe-bottom));
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #ccc;
            z-index: 50;
        }

        .footer-btn {
            background: none; border: none; font-size: 14px;
            color: #555; display: flex; align-items: center; gap: 6px;
        }

        /* 動畫類名 */
        .fish-action { animation: fishAnim 0.8s ease; }
        @keyframes fishAnim { 0% { transform: translateY(0); } 50% { transform: translateY(-30px) rotate(-15deg); } 100% { transform: translateY(0); } }

        .flip-action { animation: flipAnim 0.8s ease; }
        @keyframes flipAnim { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }

        .pop-action { animation: popAnim 0.8s ease; }
        @keyframes popAnim { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="scroll-canvas">
        <div class="node node-past" onclick="playAnim(this, 'past-modal', 'fish-action')">
            <div class="icon-render"><i class="ti ti-fish-hook"></i></div>
            <div class="node-label">憶．往昔</div>
        </div>

        <div class="node node-present" onclick="playAnim(this, 'present-modal', 'flip-action')">
            <div class="icon-render"><i class="ti ti-calendar-event"></i></div>
            <div class="node-label">看．今朝</div>
        </div>

        <div class="node node-future" onclick="playAnim(this, 'future-modal', 'pop-action')">
            <div class="icon-render"><i class="ti ti-bottle"></i></div>
            <div class="node-label">寄．明月</div>
        </div>
    </div>

    <div class="footer-bar">
        <button class="footer-btn" onclick="exportData()">📤 匯出備份</button>
        <button class="footer-btn" onclick="document.getElementById('fileInput').click()">📥 讀取備份</button>
        <input type="file" id="fileInput" accept=".json" style="display:none;" onchange="importData(event)">
    </div>

    <div id="present-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal('present-modal')">〈 歸去</button>
            <div style="flex:1; text-align:center; font-weight:bold;">墨跡記述</div>
        </div>
        <div style="padding:20px;">
            <textarea id="diaryBox" style="width:100%; height:300px; background:transparent; border:1px solid #999; border-radius:10px; padding:15px; font-size:18px;" placeholder="今日有何喜憂..."></textarea>
            <button onclick="saveDiary()" style="width:100%; margin-top:20px; padding:15px; background:var(--ink); color:white; border:none; border-radius:10px;">封存入瓶</button>
        </div>
    </div>

    <div id="past-modal" class="modal"><div class="modal-header"><button class="back-btn" onclick="closeModal('past-modal')">〈 歸去</button></div><div style="padding:20px;"><h2>歷史回憶...</h2></div></div>
    <div id="future-modal" class="modal"><div class="modal-header"><button class="back-btn" onclick="closeModal('future-modal')">〈 歸去</button></div><div style="padding:20px;"><h2>未來信件...</h2></div></div>

    <script>
        // 動畫與彈窗邏輯
        function playAnim(element, modalId, animClass) {
            const icon = element.querySelector('.icon-render');
            icon.classList.add(animClass);
            setTimeout(() => {
                icon.classList.remove(animClass);
                document.getElementById(modalId).classList.add('active');
            }, 600);
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function saveDiary() {
            const text = document.getElementById('diaryBox').value;
            if(!text) return;
            localStorage.setItem('ink_diary_' + Date.now(), text);
            alert("心情已化作微塵，封存成功。");
            closeModal('present-modal');
        }

        // 匯出備份 (JSON)
        function exportData() {
            const data = JSON.stringify(localStorage);
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `ink_diary_backup.json`;
            a.click();
        }

        // 匯入備份
        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = JSON.parse(e.target.result);
                Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                location.reload();
            };
            reader.readAsText(event.target.files[0]);
        }
    </script>
</body>
</html>
