<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>時光日記 | Past Present Future</title>
    <style>
        /* --- 基礎重設與 iOS 優化 --- */
        :root {
            --safe-area-bottom: env(safe-area-inset-bottom);
            --past-bg: #f4f4f9;
            --present-bg: #ffffff;
            --future-bg: #1a1a2e;
            --accent-color: #007aff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* --- 磁吸滾動容器 --- */
        .main-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
            position: relative;
            padding: 20px;
            text-align: center;
        }

        /* --- 區塊風格 --- */
        #past { background: var(--past-bg); color: #333; }
        #present { background: var(--present-bg); color: #000; }
        #future { background: var(--future-bg); color: #fff; }

        .icon-display { font-size: 80px; margin-bottom: 20px; }
        h2 { margin: 10px 0; font-weight: 300; letter-spacing: 2px; }

        /* --- 底部備份欄 (避開 iOS 手勢區) --- */
        .footer-tools {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px calc(10px + var(--safe-area-bottom)); /* 關鍵：避開底部橫條 */
            border-top: 0.5px solid #ccc;
            z-index: 50;
        }

        .tool-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        /* --- 全螢幕彈窗 (Modal) --- */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }

        .modal.active { transform: translateY(0); }

        .modal-header {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid #eee;
        }

        .back-btn {
            font-size: 24px;
            color: var(--accent-color);
            background: none;
            border: none;
            padding: 10px;
        }

        .modal-body { flex: 1; padding: 20px; overflow-y: auto; }

        /* 隱藏原生檔案輸入框 */
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="main-container">
        <section id="past">
            <div class="icon-display">🎣</div>
            <h2>過去的我</h2>
            <p>揮桿釣起回憶的標籤</p>
            <button onclick="openModal('past-modal')" style="margin-top:20px; padding:10px 20px; border-radius:20px; border:1px solid #333; background:none;">打開月曆</button>
        </section>

        <section id="present">
            <div class="icon-display" id="today-date">20</div>
            <h2>現在的我</h2>
            <p>點擊日曆記錄當下</p>
            <button onclick="openModal('editor-modal')" style="margin-top:20px; padding:15px 40px; border-radius:30px; background:var(--accent-color); color:#fff; border:none; font-weight:bold;">撰寫日記</button>
        </section>

        <section id="future">
            <div class="icon-display">🍾</div>
            <h2>未來的我</h2>
            <p>封存給明天的瓶中信</p>
            <button onclick="openModal('future-modal')" style="margin-top:20px; padding:10px 20px; border-radius:20px; border:1px solid #fff; background:none; color:#fff;">查看列表</button>
        </section>
    </div>

    <div class="footer-tools">
        <button class="tool-btn" onclick="exportData()">
            <span>📤</span>
            <span>匯出備份</span>
        </button>
        <button class="tool-btn" onclick="triggerFileInput()">
            <span>📥</span>
            <span>讀取備份</span>
        </button>
        <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
    </div>

    <div id="editor-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal('editor-modal')">〈 返回</button>
            <div style="flex:1; text-align:center; font-weight:bold;">今日日記</div>
        </div>
        <div class="modal-body">
            <p>這裡將會放置 7 套模板切換與療癒燈效果...</p>
            <textarea style="width:100%; height:300px; border:1px solid #ddd; border-radius:12px; padding:15px;" placeholder="寫下你的心情..."></textarea>
        </div>
    </div>

    <script>
        // 設定今日日期
        document.getElementById('today-date').innerText = new Date().getDate();

        // 彈窗控制
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // --- 匯出功能 ---
        function exportData() {
            const data = JSON.stringify(localStorage);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `my_diary_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // --- 匯入功能 ---
        function triggerFileInput() {
            document.getElementById('fileInput').click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (confirm("這將覆蓋目前的日記，確定要讀取備份嗎？")) {
                        localStorage.clear();
                        for (let key in importedData) {
                            localStorage.setItem(key, importedData[key]);
                        }
                        alert("讀取成功！頁面即將重新整理。");
                        location.reload();
                    }
                } catch (err) {
                    alert("備份檔格式不正確。");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
